```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Page</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

/* NAVBAR */
nav{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  background:#3e8da8;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
}

nav h2{
  color:#fff;
}

/* BODY */
body{
  background:#f4f6f9;
}

.container{
  width:95%;
  max-width:1100px;
  margin:auto;
  padding:100px 0 40px;
}

/* TITLE */
h1{
  text-align:center;
  margin-bottom:20px;
}

/* SEARCH */
.staff-search{
  width:100%;
  padding:12px;
  margin-bottom:25px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* STAFF CARD */
.staff{
  background:#fff;
  border-radius:12px;
  margin-bottom:15px;
  padding:15px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:20px;

  /* animation start state */
  opacity:0;
  transform:translateY(50px) scale(.95);

  transition:all .6s ease;
}

/* SHOW ANIMATION */
.staff.show{
  opacity:1;
  transform:translateY(0) scale(1);
}

/* HOVER */
.staff:hover{
  transform:translateY(-6px) scale(1.01);
  box-shadow: rgba(0, 0, 0, 0.17) 0px -23px 25px 0px inset, rgba(0, 0, 0, 0.15) 0px -36px 30px 0px inset, rgba(0, 0, 0, 0.1) 0px -79px 40px 0px inset, rgba(0, 0, 0, 0.06) 0px 2px 1px, rgba(0, 0, 0, 0.09) 0px 4px 2px, rgba(0, 0, 0, 0.09) 0px 8px 4px, rgba(0, 0, 0, 0.09) 0px 16px 8px, rgba(0, 0, 0, 0.09) 0px 32px 16px, rgba(0, 0, 0, 0.3) 0px 19px 38px, rgba(0, 0, 0, 0.22) 0px 15px 12px;
  /* box-shadow:0 10px 25px rgba(0,0,0,0.1); */
}

/* IMAGE */
.staff img{
  width:80px;
  height:80px;
  border-radius:10px;
  object-fit:cover;
  transition:.4s;
}

/* INFO */
.info{
  display:flex;
  flex-direction:column;
}

.name{
  font-weight:bold;
  font-size:18px;
}

.position{
  color:#666;
}

/* EXPANDED */
.staff.expanded{
  align-items:flex-start;
  padding:25px;
  transform:scale(1.02);
}

.staff.expanded img{
  width:200px;
  height:200px;
}

/* HISTORY */
.history{
  margin-top:10px;
  color:#444;
  line-height:1.5;
  opacity:0;
  transform:translateY(10px);
  transition:.4s;
}

.staff.expanded .history{
  opacity:1;
  transform:translateY(0);
}

/* RESPONSIVE */
@media(max-width:700px){
  .staff{
    flex-direction:column;
    align-items:flex-start;
  }

  .staff.expanded{
    flex-direction:column;
  }
}

</style>
</head>

<body>

<nav>
  <h2>GSS ALEYITA STAFF</h2>
</nav>

<div class="container">
  <h1>Our Staffs</h1>
  <input type="text" class="staff-search" id="search-box" placeholder="Search staff...">
  <div id="staffList"></div>
</div>

<script>

/* DATA */
const staffs = Array.from({length:15}, (_,i)=>({
  name:["Mrs. Tonte Ageda","Mr. Paul","Mallam Musa","Mrs. Vivian","Mrs. Inedia"][i%5],
  position:["Manager","Developer","Teacher","Accountant","HR"][i%5],
  image:["https://picsum.photos/200","https://picsum.photos/201"][i%2],
  history:"This staff member has years of experience contributing to the growth and development of the school."
}));

const staffList = document.getElementById("staffList");

/* RENDER */
function renderStaff(list){
  staffList.innerHTML="";

  list.forEach((staff,index)=>{
    const div=document.createElement("div");
    div.className="staff";

    div.style.transitionDelay = `${index * 0.1}s`; // 🔥 stagger

    div.innerHTML=`
      <img src="${staff.image}">
      <div class="info">
        <div class="name">${staff.name}</div>
        <div class="position">${staff.position}</div>
        <div class="history" hidden>${staff.history}</div>
      </div>
    `;

    addExpand(div);
    staffList.appendChild(div);
  });

  animateOnLoad();
}

renderStaff(staffs);

/* EXPAND */
function addExpand(card){
  card.addEventListener("click",()=>{
    const open=document.querySelector(".staff.expanded");

    if(open && open!==card){
      open.classList.remove("expanded");
      open.querySelector(".history").hidden=true;
    }

    card.classList.toggle("expanded");
    card.querySelector(".history").hidden=!card.classList.contains("expanded");
  });
}

/* SEARCH */
document.getElementById("search-box").addEventListener("input",(e)=>{
  const val=e.target.value.toLowerCase();

  const filtered=staffs.filter(s =>
    s.name.toLowerCase().includes(val) ||
    s.position.toLowerCase().includes(val)
  );

  renderStaff(filtered);
});

/* ANIMATION (RUN ONCE) */
function animateOnLoad(){
  const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add("show");
        observer.unobserve(entry.target); // 🔥 only once
      }
    });
  },{threshold:0.2});

  document.querySelectorAll(".staff").forEach(el=>{
    observer.observe(el);
  });
}

</script>

</body>
</html>
